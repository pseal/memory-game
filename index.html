<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON MATCH: LEGACY</title>

<style>
  :root {
    --neon-cyan: #00f3ff;
    --neon-pink: #ff00ff;
    --bg-dark: #0a0a12;
    --card-bg: #1a1a2e;
  }

  body {
    background-color: var(--bg-dark);
    color: white;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    touch-action: manipulation;
  }

  #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

  h1 {
    font-size: clamp(20px, 6vw, 40px);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin: 15px 0;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
  }

  .ui-panel {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid var(--neon-cyan);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    width: 90%;
    max-width: 380px;
    text-align: center;
  }

  .btn-group { display: flex; gap: 5px; margin-bottom: 8px; }

  button {
    background: transparent;
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
    padding: 8px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    flex: 1;
    font-size: 11px;
    transition: 0.2s;
  }

  button:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 10px var(--neon-pink); }

  #status {
    font-size: 14px;
    color: var(--neon-cyan);
    min-height: 45px;
    margin: 5px 0;
    line-height: 1.3;
  }

  /* Leaderboard Styling */
  #leaderboard {
    margin-top: 10px;
    font-size: 11px;
    text-align: left;
    border-top: 1px solid rgba(0, 243, 255, 0.3);
    padding-top: 10px;
    display: none; /* Hidden until game ends or level selected */
  }

  .lb-entry {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px border rgba(255,255,255,0.05);
  }

  /* Game Board */
  #gameBoard { display: grid; gap: 6px; perspective: 1000px; margin-bottom: 20px; width: min(96vw, 560px); box-sizing: border-box; justify-content: center; }

  .card {
  width: var(--card-size, 65px);
  height: var(--card-size, 65px);
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
  }

  .card.revealed { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--emoji-size, 28px);
    border-radius: 6px;
    border: 1px solid rgba(0, 243, 255, 0.4);
  }

  .front { background: var(--card-bg); box-shadow: inset 0 0 8px rgba(0, 243, 255, 0.3); }
  .back { background: #fff; transform: rotateY(180deg); color: black; }

  .matched .back { border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

  .shake { animation: shake 0.4s; }
  @keyframes shake { 0%, 100% { transform: rotateY(180deg) translateX(0); } 25% { transform: rotateY(180deg) translateX(-5px); } 75% { transform: rotateY(180deg) translateX(5px); } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<h1>NEON_LEGACY</h1>

<div class="ui-panel">
  <div class="btn-group">
    <button onclick="startGame(4)">EASY</button>
    <button onclick="startGame(6)">MID</button>
    <button onclick="startGame(8)">HARD</button>
  </div>
  <div style="font-size: 11px; color: #888; margin-bottom: 5px;">
    TIME: <span id="timer">0</span>s | MOVES: <span id="moves">0</span>
  </div>
  <div id="status">SELECT_DIFFICULTY</div>
  
  <div id="leaderboard"></div>
</div>

<div id="gameBoard"></div>

<script>
let firstCard, secondCard, lockBoard = true;
let matches = 0, totalPairs = 0, timer = 0, moves = 0, timerInterval, currentLevel = 4;

const symbols = ["🍎","🍌","🍇","🍓","🍒","🍍","🥝","🍉","🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🚀","🛸","⭐","🌙","🪐","🌈","🔥","💎"];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration, vol=0.05) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function startGame(size) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  currentLevel = size;
  const board = document.getElementById("gameBoard");
  board.innerHTML = "";
  matches = 0; timer = 0; moves = 0; lockBoard = true;
  clearInterval(timerInterval);
  document.getElementById("leaderboard").style.display = "none";
  
  totalPairs = (size * size) / 2;
  board.style.gridTemplateColumns = `repeat(${size}, auto)`;
  const available = Math.min(window.innerWidth * 0.96, 560);
  const cardPx    = Math.min(65, Math.floor((available - 6 * (size - 1) - 8) / size));
  const emojiPx   = Math.max(14, Math.floor(cardPx * 0.45));
  board.style.setProperty('--card-size',  cardPx  + 'px');
  board.style.setProperty('--emoji-size', emojiPx + 'px');
  
  let gameSymbols = symbols.slice(0, totalPairs);
  let cardsData = [...gameSymbols, ...gameSymbols].sort(() => Math.random() - 0.5);

  cardsData.forEach(symbol => {
    const card = document.createElement("div");
    card.classList.add("card", "revealed"); 
    card.dataset.symbol = symbol;
    card.innerHTML = `<div class="card-face front"></div><div class="card-face back">${symbol}</div>`;
    card.onclick = () => flipCard(card);
    board.appendChild(card);
  });

  let countdown = 3;
  document.getElementById("status").innerText = `NEURAL SCAN: ${countdown}`;
  
  const scanInterval = setInterval(() => {
    countdown--;
    if (countdown > 0) {
      document.getElementById("status").innerText = `NEURAL SCAN: ${countdown}`;
      playTone(200 + (3-countdown)*50, 'sawtooth', 0.4);
    } else {
      clearInterval(scanInterval);
      document.getElementById("status").innerText = "SYSTEM ACTIVE";
      document.querySelectorAll(".card").forEach(c => c.classList.remove("revealed"));
      setTimeout(() => { lockBoard = false; startTimer(); }, 600);
    }
  }, 1000);
}

function startTimer() { timerInterval = setInterval(() => { timer++; document.getElementById("timer").innerText = timer; }, 1000); }

function flipCard(card) {
  if (lockBoard || card.classList.contains("revealed") || card.classList.contains("matched")) return;
  playTone(400, 'sine', 0.1);
  card.classList.add("revealed");
  if (!firstCard) { firstCard = card; return; }
  secondCard = card;
  moves++;
  document.getElementById("moves").innerText = moves;
  checkMatch();
}

function checkMatch() {
  if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
    firstCard.classList.add("matched");
    secondCard.classList.add("matched");
    playTone(800, 'square', 0.2);
    matches++;
    if (matches === totalPairs) finishGame();
    resetTurn();
  } else {
    lockBoard = true;
    firstCard.classList.add("shake");
    secondCard.classList.add("shake");
    setTimeout(() => {
      firstCard.classList.remove("revealed", "shake");
      secondCard.classList.remove("revealed", "shake");
      resetTurn();
    }, 700);
  }
}

function resetTurn() { [firstCard, secondCard] = [null, null]; lockBoard = false; }

function finishGame() {
  clearInterval(timerInterval);
  let stars = "⭐";
  let quote = "LONG WAY TO GO";
  
  if (moves <= totalPairs + 2) { stars = "⭐⭐⭐"; quote = "CYBER DEITY"; }
  else if (moves <= totalPairs * 1.5) { stars = "⭐⭐⭐"; quote = "ELITE AGENT"; }
  else if (moves <= totalPairs * 2) { stars = "⭐⭐"; quote = "KEEP PRACTICING"; }

  document.getElementById("status").innerHTML = `<span style="color:var(--neon-pink)">${stars}</span> ${quote}`;

  // Handle Leaderboard
  setTimeout(() => {
    let playerName = prompt("DATA UPLINK: Enter Agent ID (Name):", "Agent_001") || "Anonymous";
    saveScore(playerName, timer, moves);
    showLeaderboard();
  }, 500);
}

function saveScore(name, time, moves) {
  let scores = JSON.parse(localStorage.getItem(`neon_scores_${currentLevel}`)) || [];
  scores.push({ name, time, moves });
  // Sort by time (primary) and moves (secondary)
  scores.sort((a, b) => a.time - b.time || a.moves - b.moves);
  localStorage.setItem(`neon_scores_${currentLevel}`, JSON.stringify(scores.slice(0, 5)));
}

function showLeaderboard() {
  let scores = JSON.parse(localStorage.getItem(`neon_scores_${currentLevel}`)) || [];
  let lb = document.getElementById("leaderboard");
  lb.style.display = "block";
  lb.innerHTML = `<div style="color:var(--neon-cyan); margin-bottom:5px;">TOP_RECORDS (Lvl ${currentLevel}):</div>`;
  
  if (scores.length === 0) {
    lb.innerHTML += "<div>NO DATA FOUND</div>";
  } else {
    scores.forEach((s, i) => {
      lb.innerHTML += `<div class="lb-entry"><span>${i+1}. ${s.name}</span> <span>${s.time}s / ${s.moves}m</span></div>`;
    });
  }
}

window.addEventListener('resize', () => {
  const board = document.getElementById("gameBoard");
  if (!board.children.length) return;
  const available = Math.min(window.innerWidth * 0.96, 560);
  const cardPx    = Math.min(65, Math.floor((available - 6 * (currentLevel - 1) - 8) / currentLevel));
  const emojiPx   = Math.max(14, Math.floor(cardPx * 0.45));
  board.style.setProperty('--card-size',  cardPx  + 'px');
  board.style.setProperty('--emoji-size', emojiPx + 'px');
});

// Particles
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function initParticles() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  particles = Array.from({length: 25}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.3 + 0.1, s: Math.random()*1.5 }));
}
function animate() {
  ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "rgba(0, 243, 255, 0.2)";
  particles.forEach(p => { p.y -= p.v; if(p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
  requestAnimationFrame(animate);
}
window.addEventListener('resize', initParticles);
initParticles(); animate();
</script>
</body>
</html>
